name: ci-cd-cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run server tests
        run: CI=1 pnpm -C packages/server test:ci

      - name: Validate web env url format
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AUTH_BASE_URL: ${{ secrets.VITE_AUTH_BASE_URL }}
        run: |
          set -euo pipefail

          validate_url() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            if [[ ! "$value" =~ ^https:// ]]; then
              echo "$key 必须以 https:// 开头" >&2
              return 1
            fi
            if [[ "$value" == */ ]]; then
              echo "$key 不能带尾部 /" >&2
              return 1
            fi
            return 0
          }

          validate_url "VITE_API_BASE_URL" "${VITE_API_BASE_URL:-}"
          validate_url "VITE_AUTH_BASE_URL" "${VITE_AUTH_BASE_URL:-}"

      - name: Build web
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_AUTH_BASE_URL: ${{ secrets.VITE_AUTH_BASE_URL }}
        run: pnpm -C packages/web build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist

  deploy_api:
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_WORKERS }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AIHUBMIX_API_KEY: ${{ secrets.AIHUBMIX_API_KEY }}
      AIHUBMIX_BASE_URL: ${{ secrets.AIHUBMIX_BASE_URL }}
      AIHUBMIX_MODEL_NAME: ${{ secrets.AIHUBMIX_MODEL_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required runtime secrets
        run: |
          set -euo pipefail
          missing=()

          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            DATABASE_URL
            BETTER_AUTH_SECRET
            BETTER_AUTH_URL
            FRONTEND_URL
            RESEND_API_KEY
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ -z "${OPENAI_API_KEY:-}" ] && [ -z "${AIHUBMIX_API_KEY:-}" ]; then
            missing+=("OPENAI_API_KEY 或 AIHUBMIX_API_KEY")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf "缺少必需 Secret: %s\n" "${missing[*]}" >&2
            exit 1
          fi

          validate_url() {
            local key="$1"
            local value="$2"
            if [[ ! "$value" =~ ^https:// ]]; then
              echo "$key 必须以 https:// 开头" >&2
              return 1
            fi
            if [[ "$value" == */ ]]; then
              echo "$key 不能带尾部 /" >&2
              return 1
            fi
            return 0
          }

          validate_url "BETTER_AUTH_URL" "$BETTER_AUTH_URL"
          validate_url "FRONTEND_URL" "$FRONTEND_URL"

      - name: Sync worker secrets
        run: |
          set -euo pipefail

          secret_keys=(
            DATABASE_URL
            BETTER_AUTH_SECRET
            BETTER_AUTH_URL
            FRONTEND_URL
            RESEND_API_KEY
            OPENAI_API_KEY
            AIHUBMIX_API_KEY
            AIHUBMIX_BASE_URL
            AIHUBMIX_MODEL_NAME
          )

          for key in "${secret_keys[@]}"; do
            value="${!key:-}"
            if [ -n "$value" ]; then
              printf "%s" "$value" | pnpm -C packages/server exec wrangler secret put "$key"
            fi
          done

      - name: Deploy worker
        run: pnpm -C packages/server run deploy

  deploy_web:
    runs-on: ubuntu-latest
    needs: [ci, deploy_api]
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PAGES }}
      CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate pages deploy secrets
        run: |
          set -euo pipefail
          missing=()

          for key in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN CLOUDFLARE_PAGES_PROJECT; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf "缺少必需 Secret: %s\n" "${missing[*]}" >&2
            exit 1
          fi

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist

      - name: Deploy pages
        run: pnpm -C packages/server exec wrangler pages deploy ../web/dist --project-name "$CLOUDFLARE_PAGES_PROJECT" --branch main
